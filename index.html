<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="section1 mt-5">
    <div class="container hole-container p-4" id="main-container">

        <div class="d-flex justify-content-center">
            <h1 class="heading1">TO-DO-LIST</h1>
        
          </div>
        <div class="input-field-box d-flex mt-3">
            <input
                class="input-box p-3 ms-5"
                type="text"
                placeholder="Enter task..."
                id="input-text"
            >

            <button class="btn btn-primary ms-3" id="add-btn">
                +
            </button>
        </div>

        <div class="tasks-container mt-4 d-none" id="added-tasks">
            <h3 class="tasks-heading">Tasks..</h3>

            <div id="task-list"></div>
        </div>

        <div class="completed-tasks mt-4 d-none" id="deleted-tasks">
            <h3 class="tasks-heading">Tasks Completed..</h3>

            <div id="completed-list"></div>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
